<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PickAI - AI 智能选品工具</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 PickAI</h1>
            <p class="subtitle">AI 驱动的跨境电商选品工具</p>
        </header>

        <main>
            <section class="search-section">
                <input type="text" id="productInput" placeholder="输入产品关键词..." />
                <button id="analyzeBtn">AI 分析</button>
            </section>

            <section class="results-section" id="results">
                <div class="placeholder">
                    <p>🔍 输入产品名称，AI 将为您分析市场机会</p>
                </div>
            </section>
        </main>

        <footer>
            <p>© 2025 PickAI - 为跨境电商卖家打造</p>
        </footer>
    </div>

    <script src="src/js/app.js"></script>
</body>
</html>
